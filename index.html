<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>MCBE Damage Optimizer v3</title>
                <link rel="stylesheet" href="style.css">
                </head>
                <body>

                <div class="container">
                    <h1>MCBE Damage Optimizer v3</h1>

                        <div class="input-card">
                                <div class="field">
                                            <label>基礎攻撃力 (Base Attack)</label>
                                                        <input type="number" id="baseAtk" value="1" step="any">
                                                                </div>
                                                                        <div class="field">
                                                                                    <label>目標ダメージ (Target Damage)</label>
                                                                                                <input type="number" id="targetDmg" value="100" step="any">
                                                                                                        </div>
                                                                                                                <div class="field">
                                                                                                                            <label class="checkbox-field">
                                                                                                                                            <input type="checkbox" id="isCritical"> クリティカルヒット (x1.5)
                                                                                                                                                        </label>
                                                                                                                                                                </div>
                                                                                                                                                                    </div>

                                                                                                                                                                        <button id="calcBtn">最適な組み合わせを計算</button>
                                                                                                                                                                            <div id="status" class="status"></div>

                                                                                                                                                                                <div id="resultGrid" class="result-grid">
                                                                                                                                                                                        <div class="result-card best">
                                                                                                                                                                                                    <span class="card-title">【1】目標に最も近い数値</span>
                                                                                                                                                                                                                <span id="p1_val" class="res-val">0</span>
                                                                                                                                                                                                                            <div id="p1_err" class="error-text"></div>
                                                                                                                                                                                                                                        <div class="details">
                                                                                                                                                                                                                                                        Strength Lv: <b id="p1_str">0</b><br>
                                                                                                                                                                                                                                                                        Weakness Lv: <b id="p1_wk">0</b>
                                                                                                                                                                                                                                                                                    </div>
                                                                                                                                                                                                                                                                                            </div>

                                                                                                                                                                                                                                                                                                    <div class="result-card over">
                                                                                                                                                                                                                                                                                                                <span class="card-title">【2】目標以上で最も近い数値</span>
                                                                                                                                                                                                                                                                                                                            <span id="p2_val" class="res-val">0</span>
                                                                                                                                                                                                                                                                                                                                        <div id="p2_err" class="error-text"></div>
                                                                                                                                                                                                                                                                                                                                                    <div class="details">
                                                                                                                                                                                                                                                                                                                                                                    Strength Lv: <b id="p2_str">0</b><br>
                                                                                                                                                                                                                                                                                                                                                                                    Weakness Lv: <b id="p2_wk">0</b>
                                                                                                                                                                                                                                                                                                                                                                                                </div>
                                                                                                                                                                                                                                                                                                                                                                                                        </div>
                                                                                                                                                                                                                                                                                                                                                                                                            </div>

                                                                                                                                                                                                                                                                                                                                                                                                                <div class="formula-info">
                                                                                                                                                                                                                                                                                                                                                                                                                        <b>計算順序:</b> 基礎 → Strength(x1.3+1) → Weakness(x0.8-0.5) → Critical(x1.5)
                                                                                                                                                                                                                                                                                                                                                                                                                            </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                <footer class="footer">
                                                                                                                                                                                                                                                                                                                                                                                                                                        このサイトは<a href="https://x.com/beta03B2" target="_blank" rel="noopener noreferrer">@beta03B2</a>及び、Google Geminiによって作成されました。
                                                                                                                                                                                                                                                                                                                                                                                                                                            </footer>
                                                                                                                                                                                                                                                                                                                                                                                                                                            </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                            <script src="script.js"></script>
                                                                                                                                                                                                                                                                                                                                                                                                                                            </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                            </html>
